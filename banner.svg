<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/><line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/><line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/><line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/><line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/><line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/><line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
  </g>
  <circle cx="200" cy="200" r="180" fill="#3b82f6" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="900" cy="150" r="150" fill="#60a5fa" opacity="0.04" filter="url(#blur1)"/>
  <circle cx="600" cy="350" r="120" fill="#2563eb" opacity="0.03" filter="url(#blur1)"/>
  <rect x="0" y="198" width="1200" height="4" fill="url(#glow)"/>
  <g transform="translate(80, 85)">
    <rect x="0" y="0" width="380" height="230" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="0" width="380" height="32" rx="12" fill="#1c2128"/>
    <rect x="0" y="20" width="380" height="12" fill="#1c2128"/>
    <circle cx="18" cy="16" r="5" fill="#f85149" opacity="0.8"/>
    <circle cx="36" cy="16" r="5" fill="#d29922" opacity="0.8"/>
    <circle cx="54" cy="16" r="5" fill="#3fb950" opacity="0.8"/>
    <text x="190" y="20" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="11">root@server — ssh</text>
    <text x="16" y="56" fill="#6a9955" font-family="monospace" font-size="12">✓ Connected!</text>
    <text x="16" y="78" fill="#8b949e" font-family="monospace" font-size="12">Last login: Mon Mar 9 02:45</text>
    <text x="16" y="108" fill="#d4d4d4" font-family="monospace" font-size="12"><tspan fill="#3b82f6">root</tspan>@<tspan fill="#6a9955">prod-1</tspan>:~$ htop</text>
    <text x="16" y="138" fill="#8b949e" font-family="monospace" font-size="12">CPU: <tspan fill="#3fb950">████████</tspan><tspan fill="#30363d">████</tspan> 67%</text>
    <text x="16" y="158" fill="#8b949e" font-family="monospace" font-size="12">MEM: <tspan fill="#d29922">██████</tspan><tspan fill="#30363d">██████</tspan> 48%</text>
    <text x="16" y="188" fill="#d4d4d4" font-family="monospace" font-size="12"><tspan fill="#3b82f6">root</tspan>@<tspan fill="#6a9955">prod-1</tspan>:~$ <tspan fill="#ffffff" opacity="0.6">█</tspan></text>
    <rect x="0" y="208" width="380" height="22" rx="0" fill="#111111"/>
    <rect x="0" y="218" width="380" height="12" rx="12" fill="#111111"/>
    <text x="12" y="224" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">Ctrl</text>
    <text x="48" y="224" fill="#8b949e" font-family="monospace" font-size="10">Paste</text>
    <text x="88" y="224" fill="#8b949e" font-family="monospace" font-size="10">Copy</text>
    <text x="124" y="224" fill="#8b949e" font-family="monospace" font-size="10">Tab</text>
    <text x="154" y="224" fill="#8b949e" font-family="monospace" font-size="10">Esc</text>
    <text x="182" y="224" fill="#8b949e" font-family="monospace" font-size="10">↑ ↓ ← →</text>
  </g>
  <g transform="translate(540, 120)">
    <text x="0" y="42" fill="url(#accentGrad)" font-size="38" font-family="system-ui" filter="url(#glow-filter)">⬡</text>
    <text x="50" y="40" fill="url(#textGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="-2">EazySSH</text>
    <text x="2" y="80" fill="#8b949e" font-family="system-ui" font-size="18" font-weight="400">SSH Terminal as a Telegram Mini App</text>
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="80" height="26" rx="13" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
      <text x="40" y="17" text-anchor="middle" fill="#60a5fa" font-family="system-ui" font-size="11" font-weight="600">Go</text>
      <rect x="90" y="0" width="80" height="26" rx="13" fill="#6a995520" stroke="#6a995540" stroke-width="1"/>
      <text x="130" y="17" text-anchor="middle" fill="#6a9955" font-family="system-ui" font-size="11" font-weight="600">xterm.js</text>
      <rect x="180" y="0" width="100" height="26" rx="13" fill="#d2992220" stroke="#d2992240" stroke-width="1"/>
      <text x="230" y="17" text-anchor="middle" fill="#d29922" font-family="system-ui" font-size="11" font-weight="600">WebSocket</text>
      <rect x="290" y="0" width="100" height="26" rx="13" fill="#f8514920" stroke="#f8514940" stroke-width="1"/>
      <text x="340" y="17" text-anchor="middle" fill="#f85149" font-family="system-ui" font-size="11" font-weight="600">Telegram</text>
    </g>
    <text x="2" y="170" fill="#8b949e" font-family="system-ui" font-size="13">
      <tspan x="2" dy="0">Connect to your servers directly from Telegram.</tspan>
      <tspan x="2" dy="20">No apps. No clients. Just open and type.</tspan>
    </text>
  </g>
  <rect x="0" y="396" width="1200" height="4" fill="url(#accentGrad)" opacity="0.5"/>
</svg>
