// ─── Ace Editor Helpers ───
const ACE_CDN="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6";
let aceLoaded=false;

async function loadAce(){
  if(aceLoaded)return;
  await loadScript(ACE_CDN+"/ace.min.js");
  await loadScript(ACE_CDN+"/ext-language_tools.min.js");
  aceLoaded=true;
}

function getAceMode(filename){
  const ext=filename.split(".").pop().toLowerCase();
  const map={
    js:"javascript",jsx:"jsx",ts:"typescript",tsx:"tsx",
    py:"python",go:"golang",rs:"rust",rb:"ruby",
    sh:"sh",bash:"sh",zsh:"sh",
    json:"json",yml:"yaml",yaml:"yaml",toml:"toml",ini:"ini",
    md:"markdown",txt:"text",log:"text",
    html:"html",htm:"html",xml:"xml",svg:"xml",
    css:"css",scss:"scss",less:"less",
    php:"php",java:"java",c:"c_cpp",cpp:"c_cpp",h:"c_cpp",
    sql:"sql",lua:"lua",perl:"perl",r:"r",
    dockerfile:"dockerfile",makefile:"makefile",
    conf:"properties",cfg:"properties",env:"properties",
    gitignore:"gitignore",nginx:"nginx",apache_conf:"apache_conf",
  };
  // Special filenames
  const fname=filename.toLowerCase();
  if(fname==="dockerfile")return"dockerfile";
  if(fname==="makefile"||fname==="gnumakefile")return"makefile";
  if(fname===".gitignore")return"gitignore";
  if(fname==="nginx.conf")return"nginx";
  return map[ext]||"text";
}

function isTextFile(name){
  const ext=name.split(".").pop().toLowerCase();
  const textExts=["js","jsx","ts","tsx","py","go","rs","rb","sh","bash","zsh","json","yml","yaml","toml","ini","md","txt","log","html","htm","xml","svg","css","scss","less","php","java","c","cpp","h","hpp","sql","lua","perl","r","conf","cfg","env","gitignore","makefile","dockerfile","properties","bat","ps1","fish","csh","awk","sed","vim","tmux","service","timer","socket","mount","path","nix","tf","hcl","prisma","graphql","gql","proto","pem","pub","crt","key"];
  const fname=name.toLowerCase();
  if(["dockerfile","makefile","gnumakefile",".gitignore",".env",".bashrc",".zshrc",".profile",".vimrc","license","readme","changelog","todo"].includes(fname))return true;
  return textExts.includes(ext);
}

  </div>;
}

// ─── File Editor ───
function FileEditor({filePath,fileName,server,wsRef,onClose,t,lang}){
  const[content,setContent]=useState(null);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[saveMsg,setSaveMsg]=useState("");
  const[modified,setModified]=useState(false);
  const[editorTheme,setEditorTheme]=useState(loadEditorTheme);
  const[wordWrap,setWordWrap]=useState(false);
  const[editorInfo,setEditorInfo]=useState({line:1,col:1,lines:0,errors:0,warnings:0});
  const editorRef=useRef(null);
  const containerRef=useRef(null);
  const originalContent=useRef("");
  const rtl=lang==="fa";
  const mode=getAceMode(fileName);

  // Load file content via SFTP WebSocket download
  useEffect(()=>{
    const ws=wsRef.current;
    if(!ws||ws.readyState!==WebSocket.OPEN)return;

    const handler=e=>{
      try{
        const m=JSON.parse(e.data);
        if(m.type==="download"&&m.name===fileName.split("/").pop()){
          // Decode base64 to text
          try{
            const raw=atob(m.data);
            // Try UTF-8 decode
            const bytes=new Uint8Array(raw.length);
            for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
            const text=new TextDecoder("utf-8").decode(bytes);
            originalContent.current=text;
            setContent(text);
          }catch{
            setContent(atob(m.data));
            originalContent.current=atob(m.data);
          }
          setLoading(false);
        }else if(m.type==="upload_ok"){
          setSaving(false);
          setSaveMsg("✅");
          setModified(false);
          originalContent.current=editorRef.current?.getValue()||"";
          setTimeout(()=>setSaveMsg(""),2000);
        }else if(m.type==="error"){
          if(saving){setSaving(false);setSaveMsg("❌ "+m.data);setTimeout(()=>setSaveMsg(""),3000);}
          else{setLoading(false);setContent("Error: "+m.data);}
        }
      }catch{}
    };

    ws.addEventListener("message",handler);
    // Request file download
    ws.send(JSON.stringify({action:"download",path:filePath}));

    return()=>ws.removeEventListener("message",handler);
  },[filePath]);

  // Initialize Ace Editor
  useEffect(()=>{
    if(content===null||!containerRef.current)return;
    let editor=editorRef.current;

    const init=async()=>{
      await loadAce();
      if(editorRef.current){
        editorRef.current.setValue(content,-1);
        return;
      }

      // Load the mode
      try{await loadScript(ACE_CDN+"/mode-"+mode+".min.js")}catch{}
      try{await loadScript(ACE_CDN+"/theme-"+editorTheme+".min.js")}catch{}
      // Load worker for linting
      try{
        if(["javascript","json","css","html","xml","php","yaml"].includes(mode)){
          await loadScript(ACE_CDN+"/worker-"+mode+".min.js");
        }
      }catch{}

      editor=ace.edit(containerRef.current,{
        mode:"ace/mode/"+mode,
        theme:"ace/theme/"+editorTheme,
        value:content,
        fontSize:14,
        fontFamily:"'Fira Code','JetBrains Mono','Cascadia Code','SF Mono',monospace",
        showPrintMargin:false,
        showGutter:true,
        highlightActiveLine:true,
        highlightSelectedWord:true,
        enableBasicAutocompletion:true,
        enableLiveAutocompletion:true,
        enableSnippets:false,
        tabSize:2,
        useSoftTabs:true,
        wrap:wordWrap,
        scrollPastEnd:0.3,
        displayIndentGuides:true,
        showInvisibles:false,
        animatedScroll:true,
        cursorStyle:"smooth",
        mergeUndoDeltas:true,
        behavioursEnabled:true,
        autoScrollEditorIntoView:true,
      });

      editor.commands.addCommand({
        name:"save",
        bindKey:{win:"Ctrl-S",mac:"Cmd-S"},
        exec:()=>handleSave(editor),
      });

      editor.commands.addCommand({
        name:"find",
        bindKey:{win:"Ctrl-F",mac:"Cmd-F"},
        exec:()=>editor.execCommand("find"),
      });

      editor.session.on("changeAnnotation",()=>{
        const annots=editor.session.getAnnotations();
        const errors=annots.filter(a=>a.type==="error").length;
        const warnings=annots.filter(a=>a.type==="warning").length;
        setEditorInfo(prev=>({...prev,errors,warnings}));
      });

      editor.selection.on("changeCursor",()=>{
        const pos=editor.getCursorPosition();
        setEditorInfo(prev=>({...prev,line:pos.row+1,col:pos.column+1}));
      });

      editor.session.on("change",()=>{
        const lines=editor.session.getLength();
        setEditorInfo(prev=>({...prev,lines}));
        const current=editor.getValue();
        setModified(current!==originalContent.current);
      });

      setEditorInfo({line:1,col:1,lines:editor.session.getLength(),errors:0,warnings:0});
      editorRef.current=editor;
      editor.focus();
    };

    init();

    return()=>{
      if(editorRef.current){
        editorRef.current.destroy();
        editorRef.current=null;
      }
    };
  },[content!==null]);

  // Update theme
  useEffect(()=>{
    if(!editorRef.current)return;
    const applyTheme=async()=>{
      try{await loadScript(ACE_CDN+"/theme-"+editorTheme+".min.js")}catch{}
      editorRef.current.setTheme("ace/theme/"+editorTheme);
      saveEditorTheme(editorTheme);
    };
    applyTheme();
  },[editorTheme]);

  // Update word wrap
  useEffect(()=>{
    if(editorRef.current)editorRef.current.session.setUseWrapMode(wordWrap);
  },[wordWrap]);

  const handleSave=(ed)=>{
    const editor=ed||editorRef.current;
    if(!editor)return;
    const ws=wsRef.current;
    if(!ws||ws.readyState!==WebSocket.OPEN)return;

    setSaving(true);
    setSaveMsg("");
    const text=editor.getValue();
    // Encode to base64
    const bytes=new TextEncoder().encode(text);
    let binary="";
    bytes.forEach(b=>binary+=String.fromCharCode(b));
    const b64=btoa(binary);

    const dir=filePath.split("/").slice(0,-1).join("/");
    const name=filePath.split("/").pop();
    ws.send(JSON.stringify({action:"upload",path:dir,name,data:b64}));
  };

  const handleClose=()=>{
    if(modified){
      if(!confirm(lang==="fa"?"تغییرات ذخیره نشده! خارج شوید؟":"Unsaved changes! Close anyway?"))return;
    }
    onClose();
  };

  return<div dir="ltr" style={{height:"100vh",display:"flex",flexDirection:"column",background:"#1a1a1a",color:th.text}}>
    {/* Header */}
    <div style={{padding:"8px 10px",background:"#111",borderBottom:"1px solid #ffffff10",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
      <div onClick={handleClose} style={{width:28,height:28,borderRadius:6,background:"#ffffff10",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>←</div>
      <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:14}}>{fileIcon(fileName,false)}</span>
        <span style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fileName.split("/").pop()}</span>
        {modified&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:"#d7ba7d20",color:"#d7ba7d",fontWeight:600}}>●</span>}
      </div>
      <span style={{fontSize:10,color:th.hint,fontFamily:"monospace",whiteSpace:"nowrap"}}>{mode}</span>
    </div>

    {/* Toolbar */}
    <div className="hide-scroll" style={{padding:"4px 8px",background:"#151515",borderBottom:"1px solid #ffffff08",display:"flex",gap:4,overflowX:"auto",flexShrink:0,alignItems:"center"}}>
      <button className={"editor-toolbar-btn"+(modified?" primary":"")} onClick={()=>handleSave()} disabled={saving}>
        {saving?"⏳":"💾"} {saving?t.saving:t.save}
      </button>
      <button className="editor-toolbar-btn" onClick={()=>editorRef.current?.undo()}>↩ {t.undo}</button>
      <button className="editor-toolbar-btn" onClick={()=>editorRef.current?.redo()}>↪ {t.redo}</button>
      <button className="editor-toolbar-btn" onClick={()=>editorRef.current?.execCommand("find")}>🔍</button>
      <button className={"editor-toolbar-btn"+(wordWrap?" primary":"")} onClick={()=>setWordWrap(!wordWrap)}>↩ {t.wordWrap}</button>
      <div style={{width:1,height:20,background:"#ffffff15",flexShrink:0}}/>
      <select value={editorTheme} onChange={e=>setEditorTheme(e.target.value)} style={{padding:"4px 6px",borderRadius:4,background:"#ffffff0c",color:"#ccc",border:"1px solid #ffffff15",fontSize:11,cursor:"pointer"}}>
        {EDITOR_THEMES.map(t=><option key={t} value={t}>{t.replace(/_/g," ")}</option>)}
      </select>
    </div>

    {/* Editor */}
    {loading?
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:th.hint}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:10,animation:"pulse 1s infinite"}}>📝</div>
          <div>{t.loading}</div>
        </div>
      </div>
    :
      <div ref={containerRef} style={{flex:1,width:"100%"}}/>
    }

    {/* Status Bar */}
    <div style={{padding:"3px 10px",background:"#111",borderTop:"1px solid #ffffff10",display:"flex",alignItems:"center",gap:8,flexShrink:0,fontSize:11,color:th.hint,fontFamily:"monospace"}}>
      <span>Ln {editorInfo.line}, Col {editorInfo.col}</span>
      <span>·</span>
      <span>{editorInfo.lines} lines</span>
      {editorInfo.errors>0&&<span style={{color:"#f44747"}}>✕ {editorInfo.errors} error{editorInfo.errors>1?"s":""}</span>}
      {editorInfo.warnings>0&&<span style={{color:"#d7ba7d"}}>⚠ {editorInfo.warnings} warning{editorInfo.warnings>1?"s":""}</span>}
      <div style={{flex:1}}/>
      {saveMsg&&<span style={{color:saveMsg.startsWith("✅")?"#6a9955":"#f44747"}}>{saveMsg}</span>}
      {modified&&!saveMsg&&<span style={{color:"#d7ba7d"}}>● {t.modified}</span>}
    </div>
  </div>;
}

// ─── SFTP File Manager ───
function SFTPManager({server,onClose,t,lang}){
  const[files,setFiles]=useState([]);const[path,setPath]=useState("~");const[loading,setLoading]=useState(true);
  const[connected,setConnected]=useState(false);const[error,setError]=useState("");const[confirmDel,setConfirmDel]=useState(null);
  const[editingFile,setEditingFile]=useState(null);
  const wsRef=useRef(null);const fileInputRef=useRef(null);const rtl=lang==="fa";

  useEffect(()=>{
    const ws=new WebSocket(SFTP_URL);wsRef.current=ws;
    ws.onopen=()=>{const p={host:server.host,port:parseInt(server.port)||22,username:server.username,auth_type:server.authType,init_data:tg?.initData||""};if(server.authType==="password")p.password=server.password;else{p.private_key=server.privateKey;if(server.passphrase)p.passphrase=server.passphrase}ws.send(JSON.stringify(p))};
    ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==="connected"){setConnected(true);ws.send(JSON.stringify({action:"list",path:"~"}))}else if(m.type==="list"){setPath(m.path);setFiles(m.data||[]);setLoading(false)}else if(m.type==="download"){/* handled by FileEditor or HTTP */}else if(m.type==="upload_ok"||m.type==="delete_ok"||m.type==="mkdir_ok"||m.type==="rename_ok"){ws.send(JSON.stringify({action:"list",path}))}else if(m.type==="error"){setError(m.data);setLoading(false)}}catch{}};
    ws.onerror=()=>setError("Connection failed");ws.onclose=()=>setConnected(false);
    return()=>{try{ws.close()}catch{}};
  },[server]);

  const sendCmd=(action,extra={})=>{if(wsRef.current?.readyState===WebSocket.OPEN)wsRef.current.send(JSON.stringify({action,...extra}))};
  const navigate=dir=>{setLoading(true);sendCmd("list",{path:dir})};
  const goUp=()=>{const parent=path.split("/").slice(0,-1).join("/")||"/";navigate(parent)};
  const handleUpload=e=>{const file=e.target.files[0];if(!file)return;if(file.size>50*1024*1024){setError("Max 50MB");return}const reader=new FileReader();reader.onload=()=>{const b64=reader.result.split(",")[1];sendCmd("upload",{path,name:file.name,data:b64})};reader.readAsDataURL(file);e.target.value=""};
  const handleDelete=fp=>{sendCmd("delete",{path:fp});setConfirmDel(null)};
  const handleMkdir=()=>{const name=prompt(rtl?"نام پوشه:":"Folder name:");if(name)sendCmd("mkdir",{path:path+"/"+name})};
  const handleRename=op=>{const old=op.split("/").pop();const nn=prompt(rtl?"نام جدید:":"New name:",old);if(nn&&nn!==old){const parent=op.split("/").slice(0,-1).join("/");sendCmd("rename",{path:op,dest:parent+"/"+nn})}};
  const handleDownload=fp=>{
    setError("");const chatId=tg?.initDataUnsafe?.user?.id;if(!chatId){setError("Cannot get Telegram user ID");return}
    const payload={host:server.host,port:parseInt(server.port)||22,username:server.username,auth_type:server.authType,init_data:tg?.initData||"",path:fp,chat_id:chatId};
    if(server.authType==="password")payload.password=server.password;else{payload.private_key=server.privateKey;if(server.passphrase)payload.passphrase=server.passphrase}
    setError(lang==="fa"?"در حال ارسال به تلگرام...":"Sending to Telegram...");
    fetch(WS_BASE.replace("wss://","https://")+"/sftp-download",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(r=>r.json()).then(d=>{if(d.error)setError(d.error);else setError(lang==="fa"?"✅ فایل در چت بات ارسال شد":"✅ File sent to bot chat");setTimeout(()=>setError(""),3000)}).catch(e=>setError("Failed: "+e.message));
  };

  const handleEdit=(fp,fileSize)=>{
    if(fileSize>2*1024*1024){setError(t.fileTooLarge);setTimeout(()=>setError(""),3000);return;}
    setEditingFile(fp);
  };

  // If editing, show FileEditor
  if(editingFile){
    return<FileEditor
      filePath={editingFile}
      fileName={editingFile}
      server={server}
      wsRef={wsRef}
      onClose={()=>{setEditingFile(null);sendCmd("list",{path})}}
      t={t}
      lang={lang}
    />;
  }

  const sorted=[...files].sort((a,b)=>{if(a.is_dir&&!b.is_dir)return-1;if(!a.is_dir&&b.is_dir)return 1;return a.name.localeCompare(b.name)});
  const toolBtn=(label,onClick,icon)=><div onClick={onClick} style={{padding:"6px 10px",borderRadius:6,background:"#ffffff08",color:th.text,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}><span>{icon}</span><span>{label}</span></div>;

  return<div dir={rtl?"rtl":"ltr"} style={{height:"100vh",display:"flex",flexDirection:"column",background:th.bg,color:th.text}}>
    <div style={{padding:"10px 12px",background:th.secondaryBg,borderBottom:"1px solid #ffffff0a",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
      <div onClick={onClose} style={{width:28,height:28,borderRadius:6,background:"#ffffff10",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>{rtl?"→":"←"}</div>
      <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600}}>📂 {t.sftp} <span style={{fontSize:9,opacity:.4}}>v3</span></div><div style={{fontSize:11,color:th.hint}}>{server.username}@{server.host}</div></div>
      <StatusBadge state={connected?"connected":"connecting"} t={t}/>
    </div>
    <div style={{padding:"8px 12px",background:"#ffffff04",borderBottom:"1px solid #ffffff08",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
      <div onClick={goUp} style={{width:28,height:28,borderRadius:6,background:"#ffffff08",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:12}}>⬆</div>
      <div style={{flex:1,fontSize:12,color:th.hint,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",direction:"ltr",fontFamily:"monospace"}}>{path}</div>
    </div>
    <div className="hide-scroll" style={{padding:"6px 12px",display:"flex",gap:6,overflowX:"auto",flexShrink:0,borderBottom:"1px solid #ffffff08"}}>{toolBtn(t.upload,()=>fileInputRef.current?.click(),"📤")}{toolBtn(t.newFolder,handleMkdir,"📁")}<input ref={fileInputRef} type="file" style={{display:"none"}} onChange={handleUpload}/></div>
    <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
      {loading&&<div style={{textAlign:"center",padding:40,color:th.hint}}>{t.loading}</div>}
      {!loading&&sorted.length===0&&<div style={{textAlign:"center",padding:40,color:th.hint}}>{t.empty}</div>}
      {!loading&&error&&<div style={{textAlign:"center",padding:10,color:error.startsWith("✅")?"#6a9955":"#f44747",fontSize:13}}>{error}</div>}
      {!loading&&sorted.map(f=>{const fp=path+"/"+f.name;
      return<div key={f.name} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",borderBottom:"1px solid #ffffff06",cursor:"pointer"}} onClick={()=>{if(f.is_dir)navigate(fp);else handleEdit(fp,f.size)}}>
        <span style={{fontSize:18,flexShrink:0}}>{fileIcon(f.name,f.is_dir)}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
          <div style={{fontSize:11,color:th.hint,marginTop:2}}>
            {f.is_dir?"—":humanSize(f.size)} · {f.mod_time}
            <span style={{marginLeft:8,opacity:.5,fontFamily:"monospace",fontSize:10}}>{f.perms}</span>
          </div>
        </div>
        {confirmDel===fp?<div style={{display:"flex",gap:4}}><div onClick={e=>{e.stopPropagation();handleDelete(fp)}} style={{padding:"4px 8px",borderRadius:4,background:"#f44747",color:"#fff",fontSize:11,cursor:"pointer"}}>{t.delete}</div><div onClick={e=>{e.stopPropagation();setConfirmDel(null)}} style={{padding:"4px 8px",borderRadius:4,background:"#ffffff10",color:th.hint,fontSize:11,cursor:"pointer"}}>✕</div></div>
        :<div style={{display:"flex",gap:2}} onClick={e=>e.stopPropagation()}>
          {!f.is_dir&&<MiniBtn onClick={()=>handleEdit(fp,f.size)} active title={t.edit}>📝</MiniBtn>}
          {!f.is_dir&&<MiniBtn onClick={()=>handleDownload(fp)} title={t.download}>⬇</MiniBtn>}
          <MiniBtn onClick={()=>handleRename(fp)} title={t.rename}>✏️</MiniBtn>
          <MiniBtn onClick={()=>setConfirmDel(fp)} danger title={t.delete}>✕</MiniBtn>
        </div>}
      </div>})}
    </div>
  </div>;
}

  const loadXterm=useCallback(async()=>{if(window._xtermLoaded)return;await loadCSS("https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css");await loadScript("https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js");await loadScript("https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js");await loadScript("https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js");window._xtermLoaded=true},[]);

  const connectToServer=useCallback(async server=>{
    const sid=Date.now().toString();
    setSessions(p=>[...p,{id:sid,serverId:server.id,host:server.host,label:server.label,username:server.username,state:"connecting",ws:null,term:null,fitAddon:null,containerEl:null}]);
    setActiveSessionId(sid);setScreen("terminal");await loadXterm();
    setTimeout(()=>{
      const wrapper=document.getElementById("term-wrapper");if(!wrapper)return;
      const cel=document.createElement("div");cel.style.cssText="width:100%;height:100%;";wrapper.innerHTML="";wrapper.appendChild(cel);
      const tmTheme=TERM_THEMES[termTheme]||TERM_THEMES.dark;
      const term=new window.Terminal({cursorBlink:true,fontSize:14,fontFamily:"'Fira Code','Cascadia Code','JetBrains Mono',monospace",theme:tmTheme,scrollback:5000});
      const fa=new window.FitAddon.FitAddon();term.loadAddon(fa);if(window.WebLinksAddon)term.loadAddon(new window.WebLinksAddon.WebLinksAddon());term.open(cel);fa.fit();
      term.writeln("\x1b[36m⟩ Connecting to "+server.host+"...\x1b[0m\r\n");
      const ws=new WebSocket(WS_URL);
      ws.onopen=()=>{const p={host:server.host,port:parseInt(server.port)||22,username:server.username,auth_type:server.authType,init_data:tg?.initData||""};if(server.authType==="password")p.password=server.password;else{p.private_key=server.privateKey;if(server.passphrase)p.passphrase=server.passphrase}ws.send(JSON.stringify(p))};
      ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==="connected"){setSessions(p=>p.map(s=>s.id===sid?{...s,state:"connected"}:s));term.writeln("\x1b[32m✓ Connected!\x1b[0m\r\n");fa.fit();ws.send(JSON.stringify({type:"resize",data:{cols:term.cols,rows:term.rows}}))}else if(m.type==="output")term.write(m.data);else if(m.type==="error"){setSessions(p=>p.map(s=>s.id===sid?{...s,state:"error"}:s));term.writeln("\r\n\x1b[31m✗ "+m.data+"\x1b[0m")}else if(m.type==="disconnected"){setSessions(p=>p.map(s=>s.id===sid?{...s,state:"idle"}:s));term.writeln("\r\n\x1b[33m⟩ Disconnected\x1b[0m")}}catch{}};
      ws.onerror=()=>{setSessions(p=>p.map(s=>s.id===sid?{...s,state:"error"}:s));term.writeln("\r\n\x1b[31m✗ WebSocket error\x1b[0m")};
      ws.onclose=()=>{setSessions(p=>p.map(s=>s.id===sid?{...s,state:"idle"}:s));term.writeln("\r\n\x1b[33m⟩ Connection closed\x1b[0m")};
      term.onData(d=>{if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:"input",data:d}))});
      term.onResize(({cols,rows})=>{if(ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:"resize",data:{cols,rows}}))});
      new ResizeObserver(()=>{try{fa.fit()}catch{}}).observe(cel);
      setSessions(p=>p.map(s=>s.id===sid?{...s,ws,term,fitAddon:fa,containerEl:cel}:s));
    },150);
  },[loadXterm,termTheme]);

  useEffect(()=>{const wrapper=document.getElementById("term-wrapper");if(screen!=="terminal"||!activeSessionId){if(wrapper)wrapper.innerHTML="";return}const timer=setTimeout(()=>{if(!wrapper)return;const s=sessions.find(s=>s.id===activeSessionId);if(!s?.containerEl)return;wrapper.innerHTML="";wrapper.appendChild(s.containerEl);try{s.fitAddon?.fit()}catch{}try{s.term?.focus()}catch{}},50);return()=>clearTimeout(timer)},[activeSessionId,screen,sessions]);

  const closeSession=useCallback(id=>{setSessions(prev=>{const s=prev.find(x=>x.id===id);if(s){try{s.ws?.send(JSON.stringify({type:"disconnect"}));s.ws?.close()}catch{}try{s.term?.dispose()}catch{}try{s.containerEl?.remove()}catch{}}const rem=prev.filter(x=>x.id!==id);if(id===activeSessionId){if(rem.length>0)setActiveSessionId(rem[rem.length-1].id);else{setActiveSessionId(null);setScreen("servers")}}return rem})},[activeSessionId]);

  const saveServer=srv=>{if(editServer?.id)setServers(p=>p.map(s=>s.id===editServer.id?{...srv,id:s.id}:s));else setServers(p=>[...p,{...srv,id:Date.now().toString()}]);setEditServer(null);setScreen("servers")};
  const saveAndConnect=srv=>{const ns={...srv,id:editServer?.id||Date.now().toString()};if(editServer?.id)setServers(p=>p.map(s=>s.id===editServer.id?ns:s));else setServers(p=>[...p,ns]);setEditServer(null);setTimeout(()=>connectToServer(ns),50)};
  const activeSession=sessions.find(s=>s.id===activeSessionId);

  const allTags=[...new Set(servers.flatMap(s=>s.tags||[]))];

  const filtered=servers.filter(srv=>{
    if(filterFolder&&(srv.folder||"")!==filterFolder)return false;
    if(filterTag&&!(srv.tags||[]).includes(filterTag))return false;
    return true;
  });

  const groupedByFolder={};
  if(!filterFolder){
    filtered.forEach(srv=>{const f=srv.folder||"";if(!groupedByFolder[f])groupedByFolder[f]=[];groupedByFolder[f].push(srv)});
  }else{
    groupedByFolder[filterFolder]=filtered;
  }

  if(screen==="sftp"&&sftpServer)return<SFTPManager server={sftpServer} onClose={()=>{setSftpServer(null);setScreen("servers")}} t={t} lang={lang}/>;
  if(screen==="settings")return<SettingsPanel onClose={()=>setScreen("servers")} t={t} lang={lang} termTheme={termTheme} setTermTheme={setTermTheme} folders={folders} setFolders={setFolders}/>;

  if(screen==="terminal"){
    return<div style={{height:"100vh",display:"flex",flexDirection:"column",background:th.bg,color:th.text}}>
      <div style={{padding:"8px 12px",background:th.secondaryBg,borderBottom:"1px solid #ffffff0a",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div onClick={()=>{const w=document.getElementById("term-wrapper");if(w)w.innerHTML="";setScreen("servers")}} style={{width:28,height:28,borderRadius:6,background:"#ffffff10",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>←</div>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{activeSession?.label||activeSession?.host||"Terminal"}</div><div style={{fontSize:11,color:th.hint}}>{activeSession?activeSession.username+"@"+activeSession.host:""}</div></div>
        {activeSession&&<StatusBadge state={activeSession.state} t={t}/>}
      </div>
      <SessionTabs sessions={sessions} activeId={activeSessionId} onSwitch={id=>setActiveSessionId(id)} onClose={closeSession}/>
      <div id="term-wrapper" style={{flex:1,background:TERM_THEMES[termTheme]?.background||"#0c0c0c",overflow:"hidden"}}/>
      {activeSession&&<ControlBar ws={activeSession.ws} term={activeSession.term}/>}
    </div>;
  }

  if(screen==="connect")return<ServerForm initial={editServer} onSave={saveServer} onCancel={()=>setScreen("servers")} onSaveConnect={saveAndConnect} t={t} lang={lang} folders={folders}/>;

  // ═══ SERVERS LIST ═══
  return<div dir={rtl?"rtl":"ltr"} style={{minHeight:"100vh",background:th.bg,color:th.text,overflowY:"auto",height:"100vh"}}>

    <div style={{padding:"20px 16px 16px",background:"linear-gradient(135deg,"+th.secondaryBg+","+th.bg+")",borderBottom:"1px solid #ffffff0a"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <span style={{fontSize:20}}>⬡</span>
        <h1 style={{margin:0,fontSize:20,fontWeight:700,letterSpacing:"-0.02em",flex:1}}>{t.title}</h1>
        <div onClick={()=>setScreen("settings")} style={{width:28,height:28,borderRadius:6,background:"#ffffff08",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14}}>⚙</div>
        <div onClick={toggleLang} style={{padding:"4px 10px",borderRadius:6,background:"#ffffff08",color:th.hint,fontSize:12,fontWeight:600,cursor:"pointer"}}>{t.langBtn}</div>
      </div>
      <p style={{margin:"6px 0 0",color:th.hint,fontSize:13}}>{servers.length} {t.servers}</p>
    </div>

    {(folders.length>0||allTags.length>0)&&<div className="hide-scroll" style={{padding:"8px 16px",display:"flex",gap:6,overflowX:"auto",borderBottom:"1px solid #ffffff08",flexShrink:0}}>
      <TagPill tag={t.all} active={!filterFolder&&!filterTag} onClick={()=>{setFilterFolder("");setFilterTag("")}}/>
      {folders.map(f=><TagPill key={"f_"+f} tag={"📁 "+f} active={filterFolder===f} onClick={()=>{setFilterFolder(filterFolder===f?"":f);setFilterTag("")}}/>)}
      {allTags.map(tg=><TagPill key={"t_"+tg} tag={"🏷 "+tg} active={filterTag===tg} onClick={()=>{setFilterTag(filterTag===tg?"":tg);setFilterFolder("")}}/>)}
    </div>}

    {sessions.length>0&&<div style={{padding:"8px 16px",borderBottom:"1px solid #ffffff08"}}>
      <div style={{fontSize:11,color:th.hint,marginBottom:6}}>{sessions.length} {t.sessions}</div>
      <div className="hide-scroll" style={{display:"flex",gap:6,overflowX:"auto"}}>{sessions.map(s=><div key={s.id} onClick={()=>{setActiveSessionId(s.id);setScreen("terminal")}} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,background:"#ffffff08",cursor:"pointer",whiteSpace:"nowrap",fontSize:12,color:th.text}}><StatusDot state={s.state}/><span>{s.label||s.host}</span><span onClick={e=>{e.stopPropagation();closeSession(s.id)}} style={{marginLeft:4,opacity:.4,fontSize:10,cursor:"pointer"}}>✕</span></div>)}</div>
    </div>}

    <div style={{padding:"12px 16px"}}>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 20px",color:th.hint}}><div style={{fontSize:40,marginBottom:12,opacity:.3}}>⬡</div><p style={{fontSize:15,margin:0}}>{t.noServers}</p><p style={{fontSize:13,margin:"4px 0 0",opacity:.6}}>{t.noServersTip}</p></div>}

      {Object.entries(groupedByFolder).sort(([a],[b])=>a===""?1:b===""?-1:a.localeCompare(b)).map(([folder,srvs])=>(
        <div key={folder}>
          {!filterFolder&&Object.keys(groupedByFolder).length>1&&<div style={{fontSize:12,color:th.hint,fontWeight:600,padding:"8px 0 4px",display:"flex",alignItems:"center",gap:4}}>{folder?"📁 "+folder:t.noFolder}</div>}
          {srvs.map(srv=>{
            const live=sessions.some(s=>s.serverId===srv.id&&(s.state==="connected"||s.state==="connecting"));
            const isMenuOpen=menuOpen===srv.id;
            return<div key={srv.id} style={{background:th.secondaryBg,borderRadius:12,padding:"12px 14px",marginBottom:8,border:"1px solid #ffffff08",display:"flex",alignItems:"center",gap:12,position:"relative"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:live?"#6a9955":"#7a7a7a",flexShrink:0,boxShadow:live?"0 0 6px #6a995580":"none"}}/>
              <div style={{flex:1,cursor:"pointer",minWidth:0}} onClick={()=>connectToServer(srv)}>
                <div style={{fontSize:15,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{srv.label||srv.host}</div>
                <div style={{fontSize:12,color:th.hint,marginTop:2,direction:"ltr",textAlign:rtl?"right":"left"}}>{srv.username}@{srv.host}:{srv.port||22}<span style={{marginLeft:8,opacity:.6}}>{srv.authType==="key"?"🔑":"🔒"}</span></div>
                {(srv.tags||[]).length>0&&<div style={{display:"flex",gap:3,marginTop:4,flexWrap:"wrap"}}>{srv.tags.map(tg=><span key={tg} style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:th.button+"15",color:th.button}}>🏷 {tg}</span>)}</div>}
              </div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <div onClick={e=>{e.stopPropagation();setMenuOpen(isMenuOpen?null:srv.id)}} style={{width:28,height:28,borderRadius:6,background:"#ffffff08",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,color:"#999",letterSpacing:2}}>⋮</div>
                {isMenuOpen&&<div onClick={e=>e.stopPropagation()} style={{position:"absolute",[rtl?"left":"right"]:8,top:50,background:"#222",borderRadius:10,border:"1px solid #ffffff15",padding:4,zIndex:99,minWidth:140,boxShadow:"0 8px 30px rgba(0,0,0,.5)",maxHeight:300,overflowY:"auto"}}>
  <div onClick={()=>{setMenuOpen(null);connectToServer(srv)}} style={{padding:"8px 12px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:th.text}}><span>🖥</span>{t.ssh}</div>
  <div onClick={()=>{setMenuOpen(null);setSftpServer(srv);setScreen("sftp")}} style={{padding:"8px 12px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:th.text}}><span>📂</span>{t.sftp}</div>
  <div style={{height:1,background:"#ffffff10",margin:"4px 0"}}/>
  {folders.length>0&&<><div style={{padding:"4px 12px",fontSize:11,color:th.hint}}>{t.folder}</div>{folders.map(f=><div key={f} onClick={()=>{setMenuOpen(null);setServers(p=>p.map(s=>s.id===srv.id?{...s,folder:f}:s))}} style={{padding:"8px 12px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:srv.folder===f?th.button:th.text,fontWeight:srv.folder===f?600:400}}><span>📁</span>{f}{srv.folder===f?" ✓":""}</div>)}<div onClick={()=>{setMenuOpen(null);setServers(p=>p.map(s=>s.id===srv.id?{...s,folder:""}:s))}} style={{padding:"8px 12px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:!srv.folder?th.button:th.hint}}><span>📄</span>{t.noFolder}{!srv.folder?" ✓":""}</div><div style={{height:1,background:"#ffffff10",margin:"4px 0"}}/></>}
  <div onClick={()=>{setMenuOpen(null);setEditServer(srv);setScreen("connect")}} style={{padding:"8px 12px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:th.text}}><span>✎</span>{rtl?"ویرایش":"Edit"}</div>
  <div onClick={()=>{setMenuOpen(null);setServers(p=>p.filter(s=>s.id!==srv.id))}} style={{padding:"8px 12px",borderRadius:6,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:"#f44747"}}><span>✕</span>{t.deleteServer}</div>
</div>}
              </div>
            </div>;
          })}
        </div>
      ))}
    </div>
 <div style={{position:"fixed",bottom:4,left:0,right:0,textAlign:"center",color:th.hint,fontSize:11,opacity:.3,pointerEvents:"none"}}>
  {rtl?"ساخته شده با ♡ توسط شمیتز":"Made with ♡ by Schmitz"}
</div>
    <div onClick={()=>{setEditServer(null);setScreen("connect")}} style={{position:"fixed",bottom:24,[rtl?"left":"right"]:20,width:52,height:52,borderRadius:"50%",background:th.button,color:th.buttonText,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:300,cursor:"pointer",boxShadow:"0 4px 20px "+th.button+"60"}}>+</div>
  </div>;
}

var sp=document.getElementById("splash");if(sp)sp.remove();
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
